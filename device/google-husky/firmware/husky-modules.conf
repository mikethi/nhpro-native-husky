# Google Pixel 8 Pro (husky) – modules loaded at boot
# SoC: Google Tensor G3 (zuma / Exynos GS301)
# No HAL: modules expose standard Linux interfaces only
# (DRM/KMS, ALSA/ASoC, V4L2, BlueZ, wpa_supplicant, ModemManager, /dev/input).

# ---------------------------------------------------------------------------
# Storage (UFS – must be first to ensure rootfs is accessible)
# ---------------------------------------------------------------------------
ufs_exynos

# ---------------------------------------------------------------------------
# Clocks / power management
# ---------------------------------------------------------------------------
clk_exynos_zuma
s2mpg14_core
s2mpg15_core
s2mpg14_regulator
s2mpg15_regulator

# ---------------------------------------------------------------------------
# Interrupt controller support
# GIC-600 at 0x10400000 (GICD) / 0x10440000 (GICR) – see husky.dts
# ---------------------------------------------------------------------------
irq_gic_v3

# ---------------------------------------------------------------------------
# Display – DRM/KMS, no gralloc HAL
# exynos_drm: Exynos DRM master driver
# samsung_dsim: Samsung MIPI-DSI controller
# panel_samsung_s6e3hc4: Pixel 8 Pro LTPO OLED panel (1344x2992, 120 Hz)
# ---------------------------------------------------------------------------
exynos_drm
samsung_dsim
panel_samsung_s6e3hc4

# ---------------------------------------------------------------------------
# GPU – Imagination PowerVR BXM-8-256, DRM only, no gralloc HAL
# ---------------------------------------------------------------------------
pvrsrvkm

# ---------------------------------------------------------------------------
# WiFi – Samsung SCSC S5400 (mx140 firmware), wpa_supplicant over nl80211
# ---------------------------------------------------------------------------
scsc_wlan

# ---------------------------------------------------------------------------
# Bluetooth – Samsung SCSC S5400, BlueZ over HCI
# ---------------------------------------------------------------------------
scsc_bt

# ---------------------------------------------------------------------------
# Cellular modem – Shannon 5300, ModemManager / ofono, no RIL HAL
# ---------------------------------------------------------------------------
cpif
modem_if

# ---------------------------------------------------------------------------
# Audio – Samsung ABOX DSP + codec, ALSA/ASoC, PulseAudio/PipeWire
# ---------------------------------------------------------------------------
snd_soc_samsung_abox
snd_soc_samsung_abox_gic
snd_soc_cs35l45
snd_soc_wm_adsp

# ---------------------------------------------------------------------------
# Camera – Samsung Pablo ISP + sensors, V4L2 only, no camera HAL
# ---------------------------------------------------------------------------
pablo_icpu
is_sensor_module
is_core

# ---------------------------------------------------------------------------
# NPU / EdgeTPU (Google Tensor Processing Unit)
# ---------------------------------------------------------------------------
abrolhos

# ---------------------------------------------------------------------------
# Touchscreen – Samsung SEC (sec_ts), /dev/input only
# ---------------------------------------------------------------------------
sec_ts

# ---------------------------------------------------------------------------
# GPIO keys (Power, Volume-up, Volume-down)
# Matches gpio-keys node in husky.dts (GPA4/GPA6)
# ---------------------------------------------------------------------------
gpio_keys

# ---------------------------------------------------------------------------
# USB-C (DWC3 + Exynos USB PHY), OTG dual-role
# ---------------------------------------------------------------------------
dwc3
dwc3_exynos
phy_exynos_usbdrd

# ---------------------------------------------------------------------------
# Thermal (Exynos TMU)
# ---------------------------------------------------------------------------
exynos_tmu

# ---------------------------------------------------------------------------
# Vibrator / haptics
# ---------------------------------------------------------------------------
drv2624

# ---------------------------------------------------------------------------
# NFC
# ---------------------------------------------------------------------------
st21nfc
