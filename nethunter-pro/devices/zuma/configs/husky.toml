# Google Pixel 8 Pro (husky) – device configuration for NetHunter Pro
# SoC: Google Tensor G3 (zuma / Exynos GS301)
# Boot image format: Android boot header v4 (A/B partition scheme)
#
# These values are sourced from the postmarketOS deviceinfo and husky.dts.
# They are used by bootloader.yaml to construct a valid boot.img via mkbootimg.

[device]
codename     = "husky"
manufacturer = "Google"
model        = "Pixel 8 Pro"
soc          = "zuma"
arch         = "arm64"

[bootimg]
header_version   = 4
pagesize         = 4096
base             = "0x00000000"
kernel_offset    = "0x00008000"
ramdisk_offset   = "0x01000000"
tags_offset      = "0x00000100"
dtb_offset       = "0x01f00000"

[bootimg.cmdline]
# earlycon targets Samsung/Exynos UART0 at 0x10870000 (ttySAC0)
value = "earlycon=exynos4210,mmio32,0x10870000 console=ttySAC0,115200n8 clk_ignore_unused swiotlb=noforce androidboot.hardware=zuma"

[flash]
method     = "fastboot"
boot_part  = "boot"
# The full system image goes to the userdata partition (or a dedicated
# system partition if available).  Adjust as needed for your flash layout.
root_part  = "userdata"

# ── Flash targets ─────────────────────────────────────────────────────────────
# Each [[flash.targets]] entry describes one `fastboot flash` command.
#
# Fields:
#   partition  – fastboot partition name (required)
#   image      – path/filename of the image file to flash (required)
#                Supports the ${image} variable which expands to the build
#                image basename set by build.sh (e.g. nethunterpro-YYYYMMDD-husky-phosh).
#   optional   – if true, skip this target silently when the image file is not
#                found instead of aborting (default: false)
#   slot       – A/B slot to target: "a", "b", or "all"
#                Omit (or leave empty) to use the device's current active slot.
#
# Targets are flashed in the order they appear here.

[[flash.targets]]
partition = "boot"
image     = "${image}-boot.img"
optional  = false

[[flash.targets]]
partition = "userdata"
image     = "${image}.img"
optional  = false

# ── Bootloader and radio partitions: intentionally NOT flashed ────────────────
#
# The Google Pixel ABL (Android Bootloader, e.g. bootloader-husky-ripcurrent-*)
# is a proprietary Android firmware component.  When flashed it:
#   • enforces Android Verified Boot (AVB) and injects the version-specific
#     identifier androidboot.bootloader=<version> into the kernel cmdline
#   • gates key derivation on its own "boot security level" (androidboot.vbmeta.*)
#
# Native Linux does not use Android's verified-boot chain or its boot-level
# security model.  The Linux kernel's own security mechanisms (dm-verity,
# IMA, LSM/SELinux, etc.) are independent of the ABL version.  Flashing a
# version-locked ABL would only tie the device to a specific Google firmware
# build without providing any benefit for a Linux-only installation.
#
# The radio partition (cellular modem firmware, e.g. radio-husky-g5300i-*)
# is similarly managed separately from the OS image and must only be updated
# with a known-good factory image; it is never part of a routine OS flash.
#
# Both partitions are therefore permanently excluded from this flash config.
# Do NOT add bootloader or radio entries here.  See flash-husky.sh for the
# enforcement guard that will reject them even if accidentally re-added.
#
# ── Full factory-image reset (commented out) ──────────────────────────────────
# Uncomment and adjust paths after extracting a Pixel factory ZIP to flash every
# partition required for a clean baseline before installing NetHunter Pro.
# NOTE: even in factory-reset mode, bootloader and radio are excluded above.
#
# [[flash.targets]]
# partition = "vendor"
# image     = "factory/vendor.img"
# optional  = true
#
# [[flash.targets]]
# partition = "system"
# image     = "factory/system.img"
# optional  = true
#
# [[flash.targets]]
# partition = "userdata"
# image     = "factory/userdata.img"
# optional  = false
