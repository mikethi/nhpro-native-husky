# Google Pixel 8 Pro (husky) – modprobe.d options
# SoC: Google Tensor G3 (zuma / Exynos GS301)
# No HAL: all parameters target direct kernel driver interfaces.
#
# Bare-metal values are sourced from husky.dts and deviceinfo:
#   UART0 (ttySAC0): MMIO base 0x10870000, baud 115200n8
#   GIC-600: GICD 0x10400000, GICR 0x10440000
#   Arch timer clock: 24576000 Hz
#   Boot image: header v4, pagesize 2048, base 0x01000000
#   Display: 1344x2992 LTPO OLED, 120 Hz

# ---------------------------------------------------------------------------
# Samsung SCSC WiFi (S5400 / mx140)
# firmware_variant: selects /lib/firmware/scsc/mx140/ on the kernel side.
# disable_recovery: prevents auto-reboot on firmware fault during development.
# ---------------------------------------------------------------------------
options scsc_wlan firmware_variant=mx140
options scsc_wlan disable_recovery=N
options scsc_wlan wlbt_panic_on_failure=N

# ---------------------------------------------------------------------------
# Samsung SCSC Bluetooth (same mx140 firmware image as WiFi)
# ---------------------------------------------------------------------------
options scsc_bt use_new_fw=1

# ---------------------------------------------------------------------------
# Imagination PowerVR BXM-8-256 GPU
# fw_devinfo_name: selects /lib/firmware/pvr/rogue.fw
# No gralloc/GPU HAL – DRM/KMS only.
# ---------------------------------------------------------------------------
options pvrsrvkm fw_devinfo_name=rogue.fw
options pvrsrvkm pvr_debug=0

# ---------------------------------------------------------------------------
# Samsung ABOX audio DSP
# No AudioFlinger HAL – ALSA/ASoC user-space (PulseAudio/PipeWire) only.
# firmware_name: selects /lib/firmware/abox/
# ---------------------------------------------------------------------------
options snd_soc_samsung_abox firmware_name=abox.bin
options snd_soc_samsung_abox_gic gicd_base=0x10400000

# ---------------------------------------------------------------------------
# Samsung Exynos UART (ttySAC0) – bare-metal console
# clkrate matches the SoC UART source clock (26 MHz on zuma).
# Baud 115200 matches earlycon= kernel cmdline in deviceinfo.
# ---------------------------------------------------------------------------
options samsung_serial clkrate=26000000

# ---------------------------------------------------------------------------
# Samsung UFS (exynos-ufs)
# gear: UFS HS Gear 4, lane: 2 lanes (zuma supports HS-G4L2)
# ---------------------------------------------------------------------------
options ufs_exynos ufs_gear=4 ufs_lane=2

# ---------------------------------------------------------------------------
# Shannon cellular modem (cpif / modem_if)
# Accessed via ModemManager – no RIL HAL.
# ---------------------------------------------------------------------------
options cpif force_use_s5100=1

# ---------------------------------------------------------------------------
# Samsung SEC touchscreen
# irq_type 8 = IRQ_TYPE_LEVEL_LOW (matches zuma GPIO interrupt config)
# ---------------------------------------------------------------------------
options sec_ts irq_type=8

# ---------------------------------------------------------------------------
# DWC3 USB (exynos-dwusb)
# dr_mode: peripheral|host|otg – otg for full USB-C dual-role
# ---------------------------------------------------------------------------
options dwc3 dr_mode=otg

# ---------------------------------------------------------------------------
# Exynos Thermal Management Unit
# Thermal zone polling interval in ms (matches bare-metal power budget)
# ---------------------------------------------------------------------------
options exynos_tmu polling_delay=1000
