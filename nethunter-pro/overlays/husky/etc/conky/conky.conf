# conky.conf – NHPro system monitor (terminal widget)
# Run from kgx: conky -c /etc/conky/conky.conf
#
# Displays live readings of the scheduler parameters set by init.zuma.rc,
# CPU cluster frequencies, RAM/swap, thermal sensors, and radio soft-block state.
# No X11/Wayland window – output is plain text to stdout for terminal use.

conky.config = {
    out_to_x      = false,
    out_to_console = true,
    update_interval = 2,
    total_run_times = 0,
    use_spacer = 'none',
}

conky.text = [[
══ NHPro System Monitor ══════════════════════════
CPU Cluster Frequencies
  Little (policy0, cpu0-3): ${freq 1} MHz
  Mid    (policy4, cpu4-7): ${freq 5} MHz
  Prime  (policy8, cpu8):   ${freq 9} MHz
PELT multiplier : ${cat /proc/sys/kernel/sched_pelt_multiplier}
uclamp_max bg   : ${cat /proc/vendor_sched/groups/bg/uclamp_max}
uclamp_max sys_bg: ${cat /proc/vendor_sched/groups/sys_bg/uclamp_max}
uclamp_max ota  : ${cat /proc/vendor_sched/groups/ota/uclamp_max}
pmu_limit p0    : ${cat /sys/devices/system/cpu/cpufreq/policy0/sched_pixel/pmu_limit_enable}
pmu_limit p4    : ${cat /sys/devices/system/cpu/cpufreq/policy4/sched_pixel/pmu_limit_enable}
pmu_limit p8    : ${cat /sys/devices/system/cpu/cpufreq/policy8/sched_pixel/pmu_limit_enable}
Perf mode       : ${cat /etc/nhpro/perf-mode}
──────────────────────────────────────────────────
CPU Usage
  All cores: ${cpu cpu0}% / ${cpu cpu1}% / ${cpu cpu2}% / ${cpu cpu3}%
             ${cpu cpu4}% / ${cpu cpu5}% / ${cpu cpu6}% / ${cpu cpu7}%
             ${cpu cpu8}%
──────────────────────────────────────────────────
Memory
  RAM : ${mem} / ${memmax}  (${memperc}%)
  Swap: ${swap} / ${swapmax}  (${swapperc}%)
──────────────────────────────────────────────────
Radios (soft-block: 0=on 1=off)
  WiFi      : ${cat /sys/class/rfkill/rfkill0/soft}
  Bluetooth : ${cat /sys/class/rfkill/rfkill1/soft}
  Cell(wwan): ${cat /sys/class/rfkill/rfkill2/soft}
══════════════════════════════════════════════════
]]
